[build]
  command = "npm run build"
  publish = "build"

# "Ask my CV" endpoint. The GROQ_API_KEY env var must be set in the Netlify
# site settings (and in a local .env for `netlify dev`); it is never bundled
# into the client. Reachable at /.netlify/functions/ask-cv.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Match CI and the npm-11 lockfile generator, so Netlify's `npm ci` reads the
# lockfile the same way and Vite has a supported Node runtime.
[build.environment]
  NODE_VERSION = "24"

# React Router is client-side; every deep link must fall back to index.html
# so refreshing /resume or /projects doesn't 404 on Netlify's CDN.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-lived immutable caching for fingerprinted build output and the
# self-hosted fonts. Vite hashes every file in /assets, so a content change
# ships a new URL and can never be served stale; the /fonts files are stable
# subsets. index.html is intentionally left out (default short cache) so it
# always points at the current asset hashes.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
