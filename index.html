    <script>
      // flowbite-react's tooltips can trigger benign "ResizeObserver loop"
      // errors; swallow them so they don't surface as runtime overlays.
      window.addEventListener("error", function (e) {
        if (e.message && e.message.includes("ResizeObserver loop")) {
          e.stopImmediatePropagation();
        }
      });
    </script>
