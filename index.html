<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/images/site-logo.png" />
    <!-- Self-hosted (see src/index.css @font-face); preload the two "latin"
         subset files actually used by an EN/BG audience so the browser
         starts fetching them before it discovers the CSS reference. -->
    <link
      rel="preload"
      href="/fonts/bricolage-grotesque-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin />
    <link
      rel="preload"
      href="/fonts/hanken-grotesk-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Portfolio website" />
    <link rel="manifest" href="/manifest.json" />
    <title>Ersin Hyusein</title>
    <script>
      // "ResizeObserver loop" errors are benign browser noise; swallow them
      // so they don't surface as runtime overlays.
      window.addEventListener("error", function (e) {
        if (e.message && e.message.includes("ResizeObserver loop")) {
          e.stopImmediatePropagation();
        }
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!--
      Static pre-hydration placeholder. Painted from HTML/CSS alone, before the
      JS bundle downloads, so slow connections see a branded skeleton instead of
      a blank white page. React replaces #root on mount, removing this.
    -->
    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        overflow: hidden;
        background: linear-gradient(115deg, #e0f2fe, #eff6ff 45%, #e0e7ff);
      }
      /* Ambient depth: two slow-drifting blurred fields. Low opacity keeps it
         premium, not garish. */
      #app-preloader::before,
      #app-preloader::after {
        content: "";
        position: absolute;
        width: 46vmax;
        height: 46vmax;
        border-radius: 50%;
        filter: blur(70px);
        opacity: 0.45;
        pointer-events: none;
      }
      #app-preloader::before {
        top: -14vmax;
        left: -10vmax;
        background: radial-gradient(circle, rgba(56, 138, 229, 0.5), transparent 65%);
        animation: pl-drift-a 9s ease-in-out infinite;
      }
      #app-preloader::after {
        right: -12vmax;
        bottom: -14vmax;
        background: radial-gradient(circle, rgba(129, 140, 248, 0.45), transparent 65%);
        animation: pl-drift-b 11s ease-in-out infinite;
      }
      @keyframes pl-drift-a {
        50% {
          transform: translate(6vmax, 4vmax) scale(1.1);
        }
      }
      @keyframes pl-drift-b {
        50% {
          transform: translate(-5vmax, -4vmax) scale(1.08);
        }
      }

      #app-preloader .pl-mark {
        position: relative;
        width: 112px;
        height: 112px;
        filter: drop-shadow(0 8px 18px rgba(27, 116, 228, 0.22));
        animation: pl-float 4.5s ease-in-out infinite;
      }
      @keyframes pl-float {
        50% {
          transform: translateY(-6px);
        }
      }
      #app-preloader .pl-mark svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }
      #app-preloader .pl-stroke {
        fill: none;
        stroke: #1b74e4;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        /* draw -> hold -> erase, on a strong eased loop; per-element delay staggers it */
        animation: pl-draw 2.4s cubic-bezier(0.77, 0, 0.175, 1) infinite;
      }
      #app-preloader .pl-frame {
        stroke-width: 4.5;
        opacity: 0.85;
      }
      #app-preloader .pl-e {
        animation-delay: 0.35s;
      }
      #app-preloader .pl-h {
        animation-delay: 0.55s;
      }
      @keyframes pl-draw {
        0% {
          stroke-dashoffset: 1;
        }
        40%,
        70% {
          stroke-dashoffset: 0;
        }
        100% {
          stroke-dashoffset: -1;
        }
      }

      #app-preloader .pl-track {
        position: relative;
        width: 148px;
        height: 3px;
        border-radius: 99px;
        overflow: hidden;
        background: rgba(27, 116, 228, 0.14);
      }
      #app-preloader .pl-track span {
        position: absolute;
        inset: 0;
        width: 42%;
        border-radius: 99px;
        background: linear-gradient(90deg, rgba(27, 116, 228, 0.2), #1b74e4);
        animation: pl-slide 1.2s cubic-bezier(0.77, 0, 0.175, 1) infinite;
      }
      @keyframes pl-slide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(280%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-preloader::before,
        #app-preloader::after,
        #app-preloader .pl-mark {
          animation: none;
        }
        #app-preloader .pl-stroke {
          animation: none;
          stroke-dashoffset: 0;
        }
        #app-preloader .pl-track span {
          animation: pl-slide 1.6s linear infinite;
        }
      }
    </style>
    <div id="root">
      <div id="app-preloader" role="status" aria-label="Loading">
        <div class="pl-mark">
          <svg viewBox="0 0 120 120" aria-hidden="true">
            <path
              class="pl-stroke pl-frame"
              pathLength="1"
              d="M44 18 H76 A26 26 0 0 1 102 44 V76 A26 26 0 0 1 76 102 H44 A26 26 0 0 1 18 76 V44 A26 26 0 0 1 44 18 Z" />
            <path
              class="pl-stroke pl-e"
              pathLength="1"
              d="M56 40 H44 V80 H56 M44 60 H53" />
            <path
              class="pl-stroke pl-h"
              pathLength="1"
              d="M68 40 V80 M84 40 V80 M68 60 H84" />
          </svg>
        </div>
        <div class="pl-track"><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
